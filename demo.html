<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暑期「游戏浪一夏」- 全栈原型演示</title>
    <!-- 引入 Tailwind CSS 用于快速构建 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 基础样式与重置 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&display=swap');
        
        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background-color: #f8fafc;
            overflow-x: hidden; 
            color: #334155; 
        }
        
        /* ============== 现代排版与主标题 ============== */
        .title-gradient {
            background: linear-gradient(to right, #2563eb, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Noto Serif SC', serif; 
        }

        /* ============== H5 客户端样式 ============== */
        /* 【核心重构 1】专门负责平滑缩放的左侧包裹层 */
        #main-wrapper {
            width: 100%;
            transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: width;
        }

        .game-waterfall {
            column-count: 2;
            column-gap: 16px;
            padding: 16px;
        }
        
        .game-card {
            break-inside: avoid;
            margin-bottom: 16px;
            background: #ffffff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid #f1f5f9;
        }
        .game-card:hover { 
            transform: translateY(-6px) scale(1.01); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); 
        }
        
        /* 详情页滑动面板 */
        .detail-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; 
            z-index: 50;
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow-y: auto;
            box-shadow: -20px 0 50px rgba(0,0,0,0.1);
        }
        
        .detail-panel.active { transform: translateX(0); }
        
        /* 自定义滚动条 */
        .detail-panel::-webkit-scrollbar { width: 6px; }
        .detail-panel::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        
        .info-tag {
            background-color: #f1f5f9;
            color: #475569;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background-color 0.2s;
        }
        .info-tag:hover { background-color: #e2e8f0; }
        .info-tag i { color: #64748b; font-size: 1rem;}
        
        .zhihu-box { 
            background-color: #f8fafc;
            border-left: 4px solid #ef4444; 
            border-radius: 0 16px 16px 0;
            padding: 24px;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02);
            position: relative;
        }

        /* 轮播图容器 */
        .carousel-container {
            overflow: hidden;
            position: relative;
            touch-action: pan-y; 
        }
        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.3s ease-out;
            will-change: transform;
        }
        .carousel-slide {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            user-select: none; 
            -webkit-user-drag: none; 
        }
        .carousel-slide img {
             pointer-events: none; 
        }

        /* ============== PC端适配 ============== */
        @media (min-width: 768px) {
            .mobile-banner { display: none; }
            
            /* 【核心重构 2】给 Grid 设定一个稳固的界限，不被面板开关瞬间打断，全靠父容器宽度挤压自然换行 */
            .game-waterfall {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 24px;
                padding: 32px 0;
                column-count: auto;
            }
            .game-card { margin-bottom: 0; }
            
            /* 右侧面板固定占用右侧 50% */
            .detail-panel {
                width: 50%; 
                border-left: 1px solid #e2e8f0;
            }
            
            /* 【核心重构 3】侧栏展开时，左侧容器平滑缩减至 50% 宽，卡片自适应流畅过渡 */
            body.panel-open #main-wrapper {
                width: 50%;
            }
        }

        /* ============== CMS 后台样式 ============== */
        #admin-view { display: none; }
        .admin-active #client-view { display: none; }
        .admin-active #admin-view { display: block; }
    </style>
</head>
<body>

    <!-- ==================== 1. H5 客户端视图 ==================== -->
    <div id="client-view" class="min-h-screen relative w-full overflow-hidden">
        
        <!-- 新增的包裹层：控制宽度的平滑过渡 -->
        <div id="main-wrapper">
            <div class="main-content max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
                <div class="mb-10 hidden md:flex items-baseline flex-wrap gap-4 select-none cursor-pointer" id="secret-trigger-pc">
                    <h1 class="text-5xl font-black tracking-tight text-gray-900 title-gradient">暑期「游戏浪一夏」</h1>
                    <span class="text-2xl text-gray-500 font-light tracking-wide border-l-2 border-gray-300 pl-4">东方侠影游戏安利时间</span>
                </div>

                <div class="md:hidden mb-6">
                    <div id="secret-trigger-mobile" class="select-none cursor-pointer mb-4">
                         <h1 class="text-3xl font-black tracking-tight text-gray-900 title-gradient mb-1">暑期「游戏浪一夏」</h1>
                         <p class="text-md text-gray-500 font-light tracking-wide">东方侠影游戏安利时间</p>
                    </div>
                    <div class="mobile-banner w-full h-48 bg-slate-200 rounded-2xl overflow-hidden relative shadow-inner">
                        <img src="https://placehold.co/800x400/e2e8f0/64748b?text=Summer+Game+Banner" class="absolute inset-0 w-full h-full object-cover" alt="Banner">
                    </div>
                </div>

                <div id="game-list-container" class="game-waterfall">
                    <!-- 动态内容注入处 -->
                </div>
            </div>
        </div>

        <div id="detail-panel" class="detail-panel">
            <button id="close-btn" class="absolute top-5 right-5 z-20 w-10 h-10 bg-white/50 backdrop-blur-md hover:bg-white/80 text-gray-800 rounded-full flex items-center justify-center transition-all shadow-sm border border-white/60 focus:outline-none">
                <i class="fas fa-times text-xl"></i>
            </button>

            <div id="detail-content" class="pb-12">
                <!-- 动态内容注入处 -->
            </div>
        </div>
        
        <div id="overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden md:hidden transition-opacity"></div>
    </div>


    <!-- ==================== 2. CMS 后台管理视图 ==================== -->
    <div id="admin-view" class="min-h-screen bg-slate-100 py-8 px-4 sm:px-6 lg:px-8">
        <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
            <div class="bg-slate-900 px-8 py-5 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-white tracking-wide">内容配置后台 (CMS)</h2>
                <div class="flex items-center gap-4">
                    <span class="text-slate-400 text-sm hidden sm:inline"><i class="fas fa-database mr-1"></i> Data saved locally</span>
                    <button onclick="toggleMode()" class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-md transition-colors">退出后台</button>
                </div>
            </div>
            
            <div class="p-8 flex flex-col lg:flex-row gap-10">
                <div class="flex-1">
                    <h3 class="text-lg font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6">新增 / 编辑游戏数据</h3>
                    <form id="admin-form" class="space-y-5">
                        <input type="hidden" id="form-id">
                        
                        <div class="grid grid-cols-2 gap-5">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">游戏名称</label>
                                <input type="text" id="form-title" required class="w-full rounded-lg border-slate-300 shadow-sm border p-2.5 focus:ring-indigo-500 focus:border-indigo-500 bg-slate-50">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">开发团队</label>
                                <input type="text" id="form-team" required class="w-full rounded-lg border-slate-300 shadow-sm border p-2.5 focus:ring-indigo-500 focus:border-indigo-500 bg-slate-50">
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-5">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">游戏类型</label>
                                <input type="text" id="form-type" placeholder="如：悬疑逃生" required class="w-full rounded-lg border-slate-300 shadow-sm border p-2.5 focus:ring-indigo-500 focus:border-indigo-500 bg-slate-50">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">售价 (元)</label>
                                <input type="text" id="form-price" required class="w-full rounded-lg border-slate-300 shadow-sm border p-2.5 focus:ring-indigo-500 focus:border-indigo-500 bg-slate-50">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1">主题色 (底边条)</label>
                                <input type="color" id="form-color" value="#6366f1" class="w-full h-11 rounded-lg border-slate-300 shadow-sm border p-1 cursor-pointer bg-slate-50">
                            </div>
                        </div>
                        
                         <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">详情页跳转链接 (URL)</label>
                            <input type="url" id="form-url" placeholder="https://store.steampowered.com/..." class="w-full rounded-lg border-slate-300 shadow-sm border p-2.5 focus:ring-indigo-500 focus:border-indigo-500 bg-slate-50">
                        </div>

                        <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1">封面图片 URL</label>
              <div class="flex gap-2">
                <input type="text" id="form-cover" required placeholder="https://..." oninput="handleCoverInput()" class="flex-1 rounded-lg border-slate-300 shadow-sm border p-2.5 bg-slate-50">
                <button type="button" onclick="extractColorFromCover()" id="extract-color-btn" class="bg-indigo-600 hover:bg-indigo-700 disabled:bg-gray-400 text-white px-4 py-2.5 rounded-lg text-sm font-bold shadow-md transition-colors whitespace-nowrap">
                  <i class="fas fa-eye-dropper mr-1"></i>自动取色
                </button>
              </div>
              <div id="cover-preview-container" class="mt-2 hidden">
                <img id="cover-preview" alt="封面预览" class="max-h-32 rounded shadow" onload="handleCoverLoad()" onerror="handleCoverError()">
              </div>
            </div>
            
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-1">游戏截图 URLs (多图逗号分隔)</label>
              <input type="text" id="form-screenshots" placeholder="https://img1.jpg, https://img2.jpg" class="w-full rounded-lg border-slate-300 shadow-sm border p-2.5 bg-slate-50">
            </div>

                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1">游戏简介</label>
                            <textarea id="form-desc" rows="3" required class="w-full rounded-lg border-slate-300 shadow-sm border p-2.5 bg-slate-50"></textarea>
                        </div>

                        <div class="bg-indigo-50/50 p-5 rounded-xl border border-indigo-100">
                            <h4 class="font-bold text-indigo-900 mb-2 flex items-center gap-2">
                                <i class="fab fa-zhihu text-blue-500 text-lg"></i> 开发者说 (知乎模拟抓取)
                            </h4>
                            <p class="text-xs text-indigo-600 mb-3">输入知乎回答链接，模拟服务端抓取作者与正文。</p>
                            <div class="flex gap-3 mb-2">
                                <input type="text" id="form-zhihu-url" placeholder="https://www.zhihu.com/question/..." class="flex-1 rounded-lg border-indigo-200 shadow-sm border p-2.5 text-sm focus:ring-indigo-500 focus:border-indigo-500">
                                <button type="button" onclick="mockZhihuScrape()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-md transition-colors whitespace-nowrap">抓取内容</button>
                            </div>
                            <input type="hidden" id="form-zhihu-author">
                            <input type="hidden" id="form-zhihu-content">
                            <div id="scrape-status" class="text-sm text-emerald-600 font-medium hidden mt-2"><i class="fas fa-check-circle mr-1"></i>抓取成功，数据已暂存表单。</div>
                        </div>

                        <div class="pt-6 flex gap-4">
                            <button type="submit" class="flex-1 bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg transition-transform active:scale-95">发布数据至 H5</button>
                            <button type="button" onclick="resetForm()" class="bg-white border-2 border-slate-200 text-slate-600 font-bold py-3.5 px-6 rounded-xl hover:bg-slate-50 transition-colors">清空</button>
                        </div>
                    </form>
                </div>

                <div class="flex-1 lg:border-l border-slate-200 lg:pl-10 mt-10 lg:mt-0">
                    <h3 class="text-lg font-bold text-slate-800 border-b-2 border-slate-100 pb-3 mb-6">已发布游戏管理 (<span id="game-count">0</span>)</h3>
                    <div id="admin-data-list" class="space-y-4 max-h-[700px] overflow-y-auto pr-2">
                        <!-- 数据列表动态注入 -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== 3. 全栈业务逻辑 (JavaScript) ==================== -->
    <script>
        /**
         * 1. 模拟数据库
         */
        const defaultData = [
            {
                id: '1700000001',
                title: '绍宋：还我河山',
                team: '互动之星开发组',
                type: '影视互动游戏',
                price: '18.20',
                color: '#8b5cf6',
                cover: 'https://placehold.co/600x340/3f3f46/ffffff?text=Zhao+Song+Cover',
                screenshots: [
                    'https://placehold.co/800x600/475569/ffffff?text=Screenshot+1',
                    'https://placehold.co/800x600/334155/ffffff?text=Screenshot+2',
                    'https://placehold.co/800x600/1e293b/ffffff?text=Screenshot+3'
                ],
                targetUrl: 'https://store.steampowered.com/',
                date: '2026.8',
                desc: '这是一沉浸式真人互动历史权谋影视游戏！你将化身赵玖，魂穿南宋最具争议的皇帝赵构，每次抉择都将左右王朝气运、定夺天下兴亡！面对靖康之变后的山河破碎，你能否打破宿命再造山河？',
                zhihuAuthor: '李制作 (制作人)',
                zhihuAvatar: 'https://placehold.co/100x100/fbbf24/000000?text=Dev',
                zhihuContent: '开发这款游戏最大的乐趣在于历史的推演。我们在剧本上花费了数年时间，考证了大量的宋史资料。最核心的玩法是“势”，玩家不仅要在朝堂上平衡文武，还要考虑到金国的军事压力。每一次在选项前的犹豫，都是我们希望带给玩家的历史沉重感。'
            },
            {
                id: '1700000002',
                title: '隐形守护者',
                team: 'NewOne Studio',
                type: '谍战互动影像',
                price: '38.00',
                color: '#0f766e', 
                cover: 'https://placehold.co/600x340/1c1917/ffffff?text=Invisible+Guardian',
                screenshots: [
                    'https://placehold.co/800x600/000000/ffffff?text=Spy+Game+Pic+1'
                ],
                targetUrl: 'https://store.steampowered.com/',
                date: '2019.1',
                desc: '你叫肖途，两年前的你，还是上海一个名噪一时的爱国学生。现在，你成为了潜伏在敌后的一名谍报人员。你的每一个选择都生死攸关。',
                zhihuAuthor: '谍战策划组',
                zhihuAvatar: 'https://placehold.co/100x100/10b981/ffffff?text=Spy',
                zhihuContent: '为了还原那个年代的质感，所有的服装、道具都是定制的。我们希望玩家不仅是在玩游戏，更像是在经历一部能够自己主导结局的谍战大片。'
            },
             {
                id: '1700000003',
                title: '飞越13号房',
                team: 'ALT Lab',
                type: '悬疑逃生',
                price: '42.00',
                color: '#b45309', 
                cover: 'https://placehold.co/600x340/451a03/ffffff?text=Room+13',
                screenshots: [
                    'https://placehold.co/800x600/27272a/ffffff?text=Escape+1',
                    'https://placehold.co/800x600/3f3f46/ffffff?text=Escape+2'
                ],
                targetUrl: 'https://store.steampowered.com/',
                date: '2023.1',
                desc: '属于中国青年的悬疑互动影像作品。背景设定在21世纪初，你将扮演一名驰骋游戏世界的叛逆少年，被送入了一所行为矫正中心。',
                zhihuAuthor: 'ALT主策',
                zhihuAvatar: 'https://placehold.co/100x100/dc2626/ffffff?text=ALT',
                zhihuContent: '这不是一个轻松的故事。我们深入调查了许多真实的案例。游戏里最难的设计是如何在绝望中给玩家留下一线生机，以及同伴之间的羁绊和背叛。'
            }
        ];

        function getGames() {
            const data = localStorage.getItem('gamesData');
            return data ? JSON.parse(data) : defaultData;
        }

        function saveGames(games) {
            localStorage.setItem('gamesData', JSON.stringify(games));
        }

        if (!localStorage.getItem('gamesData')) {
            saveGames(defaultData);
        }

        /**
         * 2. 前端 H5 渲染逻辑
         */
        function renderClientList() {
            const games = getGames();
            const container = document.getElementById('game-list-container');
            container.innerHTML = ''; 

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card flex flex-col group';
                card.onclick = () => openDetail(game.id);

                card.innerHTML = `
                    <div class="relative pt-[56.25%] w-full bg-slate-100 overflow-hidden">
                        <img src="${game.cover}" alt="${game.title}" class="absolute top-0 left-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                    </div>
                    <div class="flex justify-between items-center px-4 py-2 text-white text-xs font-semibold tracking-wider" style="background-color: ${game.color};">
                        <span>售价 ${game.price}</span>
                        <i class="fab fa-steam opacity-90 group-hover:scale-110 transition-transform"></i>
                    </div>
                    <div class="p-5">
                        <h3 class="font-bold text-slate-800 text-lg leading-tight mb-2 truncate group-hover:text-indigo-600 transition-colors">${game.title}</h3>
                        <p class="text-sm text-slate-500 truncate">${game.team}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        const detailPanel = document.getElementById('detail-panel');
        const overlay = document.getElementById('overlay');
        const body = document.body;
        let panelStartX = 0;

        let currentSlide = 0;
        let slideCount = 0;
        let carouselInterval;
        let carouselTrack;
        let carouselDots;
        
        let isDragging = false;
        let startPos = 0;
        let currentTranslate = 0;
        let prevTranslate = 0;

        function openDetail(id) {
            const games = getGames();
            const game = games.find(g => g.id === id);
            if(!game) return;

            const contentContainer = document.getElementById('detail-content');
            
            let shots = [];
            if (Array.isArray(game.screenshots) && game.screenshots.length > 0) {
                 shots = game.screenshots;
            } else if (game.screenshot) { 
                 shots = [game.screenshot];
            } else {
                 shots = [game.cover]; 
            }
            
            slideCount = shots.length;
            currentSlide = 0;

            let slidesHtml = '';
            let dotsHtml = '';
            shots.forEach((shot, index) => {
                slidesHtml += `<div class="carousel-slide"><img src="${shot}" class="w-full h-full object-cover" alt="截图${index+1}"></div>`;
                dotsHtml += `<div class="w-2.5 h-2.5 rounded-full cursor-pointer transition-all duration-300 shadow-sm ${index === 0 ? 'bg-white w-6' : 'bg-white/40 hover:bg-white/70'}" onclick="goToSlide(${index})"></div>`;
            });

            const linkUrl = game.targetUrl || '#';

            contentContainer.innerHTML = `
                <div class="relative w-full h-64 md:h-72 bg-slate-900 carousel-container" id="carousel-container">
                    <div class="carousel-track" id="carousel-track">
                        ${slidesHtml}
                    </div>
                    <div class="absolute bottom-4 w-full flex justify-center gap-2 z-10" id="carousel-dots">
                        ${dotsHtml}
                    </div>
                </div>

                <div class="p-6 md:p-8">
                    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-8 gap-4">
                        <h2 class="text-3xl font-black text-slate-800 leading-tight">${game.title}</h2>
                        <a href="${linkUrl}" target="_blank" class="shrink-0 bg-slate-800 text-white px-5 py-2.5 rounded-full text-sm font-bold flex items-center justify-center gap-2 hover:bg-indigo-600 transition-colors shadow-md">
                            去Steam页面瞅瞅! <i class="fab fa-steam text-lg"></i>
                        </a>
                    </div>

                    <div class="grid grid-cols-2 gap-y-4 gap-x-3 mb-10">
                        <div class="info-tag"><i class="fas fa-gamepad"></i> ${game.type || '未设置'}</div>
                        <div class="info-tag"><i class="far fa-calendar-alt"></i> ${game.date || '待定'}</div>
                        <div class="info-tag"><i class="fas fa-tag"></i> ${game.price ? '¥'+game.price : '免费'}</div>
                        <div class="info-tag truncate"><i class="fas fa-users"></i> ${game.team}</div>
                    </div>

                    <div class="mb-12">
                        <h3 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-3">
                            <span class="w-2 h-6 bg-indigo-500 rounded-full inline-block"></span> 游戏介绍
                        </h3>
                        <p class="text-slate-600 text-base leading-loose text-justify font-light">
                            ${game.desc}
                        </p>
                    </div>

                    <div class="mb-4">
                        <div class="zhihu-box">
                            <div class="flex items-center gap-2 mb-4">
                                <div class="bg-blue-100 text-blue-600 rounded-full p-1.5 flex items-center justify-center">
                                    <i class="fab fa-zhihu text-xl"></i>
                                </div>
                                <span class="font-bold text-slate-700 text-lg">开发者手记</span>
                            </div>
                            
                            <p class="font-bold text-slate-900 text-lg mb-6 leading-snug">
                                “请说出一个理由，为什么玩家要体验你开发的这款游戏，最好玩的点在哪里？”
                            </p>
                            
                            <div class="flex items-center gap-4 mb-4">
                                <img src="${game.zhihuAvatar}" class="w-12 h-12 rounded-full shadow-sm object-cover border-2 border-white" alt="Avatar">
                                <div>
                                    <div class="font-bold text-slate-800">${game.zhihuAuthor || '知乎用户'}</div>
                                </div>
                            </div>

                            <div class="text-slate-600 text-base leading-relaxed mt-2 italic">
                                ${game.zhihuContent || '暂无内容...'}
                            </div>
                        </div>
                    </div>
                </div>
            `;

            initCarousel();

            detailPanel.classList.add('active');
            body.classList.add('panel-open');
            overlay.classList.remove('hidden');
        }

        function initCarousel() {
            carouselTrack = document.getElementById('carousel-track');
            carouselDots = document.getElementById('carousel-dots').children;
            const container = document.getElementById('carousel-container');
            
            updateCarousel();
            startAutoSlide();

            container.addEventListener('mousedown', touchStart);
            container.addEventListener('touchstart', touchStart, {passive: true});
            
            window.addEventListener('mousemove', touchMove);
            window.addEventListener('touchmove', touchMove, {passive: false});
            window.addEventListener('mouseup', touchEnd);
            window.addEventListener('touchend', touchEnd);
        }

        function startAutoSlide() {
            if(slideCount <= 1) return;
            clearInterval(carouselInterval);
            carouselInterval = setInterval(() => {
                currentSlide = (currentSlide + 1) % slideCount;
                updateCarousel();
            }, 3000); 
        }

        function stopAutoSlide() {
            clearInterval(carouselInterval);
        }

        window.goToSlide = function(index) {
            currentSlide = index;
            updateCarousel();
            startAutoSlide(); 
        }

        function updateCarousel() {
            if(!carouselTrack) return;
            const containerWidth = document.getElementById('carousel-container').offsetWidth;
            currentTranslate = currentSlide * -containerWidth;
            prevTranslate = currentTranslate;
            
            carouselTrack.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            setSliderPosition();
            
            Array.from(carouselDots).forEach((dot, idx) => {
                if (idx === currentSlide) {
                    dot.className = 'w-6 h-2.5 rounded-full cursor-pointer transition-all duration-300 bg-white shadow-sm';
                } else {
                    dot.className = 'w-2.5 h-2.5 rounded-full cursor-pointer transition-all duration-300 bg-white/40 hover:bg-white/70 shadow-sm';
                }
            });
        }

        function setSliderPosition() {
            carouselTrack.style.transform = `translateX(${currentTranslate}px)`;
        }

        function touchStart(event) {
            if(slideCount <= 1) return;
            if(!event.target.closest('#carousel-container')) return;
            
            isDragging = true;
            startPos = getPositionX(event);
            stopAutoSlide();
            carouselTrack.style.transition = 'none'; 
        }

        function touchMove(event) {
            if (!isDragging) return;
             if(event.type === 'touchmove') {
                 event.preventDefault();
             }
            const currentPosition = getPositionX(event);
            const diff = currentPosition - startPos;
            currentTranslate = prevTranslate + diff;
            setSliderPosition();
        }

        function touchEnd() {
            if (!isDragging) return;
            isDragging = false;
            
            const movedBy = currentTranslate - prevTranslate;
            const threshold = document.getElementById('carousel-container').offsetWidth * 0.2; 
            
            if (movedBy < -threshold) {
                currentSlide = (currentSlide + 1) % slideCount;
            } else if (movedBy > threshold) {
                currentSlide = (currentSlide - 1 + slideCount) % slideCount;
            }
            
            updateCarousel(); 
            startAutoSlide();
        }

        function getPositionX(event) {
            return event.type.includes('mouse') ? event.clientX : event.touches[0].clientX;
        }

        function closeDetail() {
            detailPanel.classList.remove('active');
            body.classList.remove('panel-open');
            overlay.classList.add('hidden');
            stopAutoSlide(); 
        }

        document.getElementById('close-btn').addEventListener('click', closeDetail);
        overlay.addEventListener('click', closeDetail);

        detailPanel.addEventListener('touchstart', (e) => {
            if(e.target.closest('#carousel-container')) return;
            panelStartX = e.touches[0].clientX;
        }, {passive: true});

        detailPanel.addEventListener('touchend', (e) => {
            if(e.target.closest('#carousel-container')) return;
            const endX = e.changedTouches[0].clientX;
            if (endX - panelStartX > 100 && window.innerWidth < 768) {
                closeDetail();
            }
        });

        /**
         * 3. CMS 后台逻辑 
         */
        function renderAdminList() {
            const games = getGames();
            const listContainer = document.getElementById('admin-data-list');
            document.getElementById('game-count').innerText = games.length;
            listContainer.innerHTML = '';

            games.forEach(game => {
                const item = document.createElement('div');
                item.className = 'flex items-center justify-between p-4 bg-white border border-slate-200 rounded-xl hover:shadow-md transition-shadow';
                item.innerHTML = `
                    <div class="flex items-center gap-4 overflow-hidden">
                        <img src="${game.cover}" class="w-16 h-12 object-cover rounded shadow-sm border">
                        <div class="truncate">
                            <div class="font-bold text-slate-800 truncate">${game.title}</div>
                            <div class="text-sm text-slate-500">${game.type || '未分类'} | ¥${game.price}</div>
                        </div>
                    </div>
                    <div class="flex gap-3 shrink-0 ml-4">
                        <button type="button" onclick="editGame('${game.id}')" class="text-indigo-600 hover:text-indigo-800 bg-indigo-50 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors"><i class="fas fa-edit mr-1"></i>编辑</button>
                        <button type="button" onclick="deleteGame('${game.id}')" class="text-rose-600 hover:text-rose-800 bg-rose-50 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        document.getElementById('admin-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const games = getGames();
            const formId = document.getElementById('form-id').value;
            
            const shotsStr = document.getElementById('form-screenshots').value;
            const screenshotsArray = shotsStr ? shotsStr.split(',').map(s => s.trim()).filter(s => s) : [];

            const gameData = {
                id: formId || Date.now().toString(),
                title: document.getElementById('form-title').value,
                team: document.getElementById('form-team').value,
                type: document.getElementById('form-type').value, 
                price: document.getElementById('form-price').value,
                color: document.getElementById('form-color').value,
                cover: document.getElementById('form-cover').value,
                screenshots: screenshotsArray,
                targetUrl: document.getElementById('form-url').value,
                desc: document.getElementById('form-desc').value,
                zhihuAuthor: document.getElementById('form-zhihu-author').value || '官方测试号',
                zhihuAvatar: 'https://placehold.co/100x100/3b82f6/ffffff?text=User', 
                zhihuContent: document.getElementById('form-zhihu-content').value || '尚未配置知乎链接。'
            };

            if (formId) {
                const index = games.findIndex(g => g.id === formId);
                if(index > -1) games[index] = {...games[index], ...gameData};
            } else {
                games.unshift(gameData);
            }

            saveGames(games);
            alert('发布成功！数据已更新。');
            resetForm();
            renderAdminList();
            renderClientList(); 
        });

        function mockZhihuScrape() {
            const url = document.getElementById('form-zhihu-url').value;
            if(!url) return alert('请输入知乎回答链接');
            if(!url.includes('zhihu.com')) return alert('只能抓取包含 zhihu.com 的链接');

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> 抓取中';
            btn.disabled = true;
            document.getElementById('scrape-status').classList.add('hidden');

            setTimeout(() => {
                document.getElementById('form-zhihu-author').value = "某知名游戏评论员 (抓取)";
                document.getElementById('form-zhihu-content').value = "（通过后端爬虫从知乎抓取的内容）我认为这款游戏的核心机制非常惊艳。从数值平衡到剧情走向，制作组显然投入了极大的心血。尤其是中后期的那个转折，简直是神来之笔！强推给喜欢剧情向的玩家。";
                
                document.getElementById('scrape-status').classList.remove('hidden');
                btn.innerText = originalText;
                btn.disabled = false;
            }, 800);
        }

        window.editGame = function(id) {
            const game = getGames().find(g => g.id === id);
            if(!game) return;

            document.getElementById('form-id').value = game.id;
            document.getElementById('form-title').value = game.title;
            document.getElementById('form-team').value = game.team;
            document.getElementById('form-type').value = game.type || ''; 
            document.getElementById('form-price').value = game.price;
            document.getElementById('form-color').value = game.color || '#8b5cf6';
            document.getElementById('form-cover').value = game.cover;
            
            // 更新封面预览
            const previewContainer = document.getElementById('cover-preview-container');
            const previewImg = document.getElementById('cover-preview');
            if (game.cover) {
                previewContainer.classList.remove('hidden');
                previewImg.src = game.cover;
            } else {
                previewContainer.classList.add('hidden');
            }
            
            document.getElementById('form-screenshots').value = Array.isArray(game.screenshots) ? game.screenshots.join(', ') : '';
            document.getElementById('form-url').value = game.target_url || game.targetUrl || '';
            document.getElementById('form-desc').value = game.description || game.desc || '';
            
            document.getElementById('form-zhihu-author').value = game.zhihu_author || game.zhihuAuthor || '';
            document.getElementById('form-zhihu-content').value = game.zhihu_content || game.zhihuContent || '';
            document.getElementById('scrape-status').classList.add('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteGame = function(id) {
            if(confirm('确定要删除这个游戏吗？')) {
                let games = getGames();
                games = games.filter(g => g.id !== id);
                saveGames(games);
                renderAdminList();
                renderClientList();
            }
        };

        function resetForm() {
            document.getElementById('admin-form').reset();
            document.getElementById('form-id').value = '';
            document.getElementById('form-zhihu-author').value = '';
            document.getElementById('form-zhihu-content').value = '';
            document.getElementById('scrape-status').classList.add('hidden');
            
            // 重置封面预览
            const previewContainer = document.getElementById('cover-preview-container');
            previewContainer.classList.add('hidden');
            if (extractTimeout) clearTimeout(extractTimeout);
        }

        /**
         * 4. 隐藏触发逻辑
         */
        let secretClickCount = 0;
        let secretClickTimer = null;
        let extractTimeout = null;

        // 图片主色调提取功能
        function rgbToHex(r, g, b) {
            const toHex = (n) => {
                const hex = Math.round(n).toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            };
            return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
        }

        function extractDominantColor(img) {
            return new Promise((resolve, reject) => {
                try {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // 缩小图片以提高处理速度
                    const scale = Math.min(100 / img.width, 100 / img.height, 1);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const pixels = imageData.data;
                    
                    let r = 0, g = 0, b = 0, count = 0;
                    
                    // 计算平均颜色，跳过透明像素
                    for (let i = 0; i < pixels.length; i += 4) {
                        if (pixels[i + 3] > 128) { // 只统计不透明像素
                            r += pixels[i];
                            g += pixels[i + 1];
                            b += pixels[i + 2];
                            count++;
                        }
                    }
                    
                    if (count === 0) {
                        resolve('#6366f1'); // 默认颜色
                        return;
                    }
                    
                    r /= count;
                    g /= count;
                    b /= count;
                    
                    resolve(rgbToHex(r, g, b));
                } catch (error) {
                    reject(error);
                }
            });
        }

        let isExtracting = false;
        function extractColorFromCover() {
            const coverUrl = document.getElementById('form-cover').value;
            if (!coverUrl) return;
            
            const btn = document.getElementById('extract-color-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>提取中';
            isExtracting = true;
            
            try {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                
                img.onload = async () => {
                    try {
                        const color = await extractDominantColor(img);
                        document.getElementById('form-color').value = color;
                    } catch (error) {
                        console.error('提取颜色失败:', error);
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-eye-dropper mr-1"></i>自动取色';
                        isExtracting = false;
                    }
                };
                
                img.onerror = () => {
                    console.error('图片加载失败');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-eye-dropper mr-1"></i>自动取色';
                    isExtracting = false;
                };
                
                img.src = coverUrl;
            } catch (error) {
                console.error('提取颜色出错:', error);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-eye-dropper mr-1"></i>自动取色';
                isExtracting = false;
            }
        }

        function handleCoverInput() {
            // 输入时清除之前的超时
            if (extractTimeout) clearTimeout(extractTimeout);
            
            // 更新预览
            const coverUrl = document.getElementById('form-cover').value;
            const previewContainer = document.getElementById('cover-preview-container');
            const previewImg = document.getElementById('cover-preview');
            
            if (coverUrl) {
                previewContainer.classList.remove('hidden');
                previewImg.src = coverUrl;
            } else {
                previewContainer.classList.add('hidden');
            }
            
            // 延迟自动提取，避免频繁请求
            const formId = document.getElementById('form-id').value;
            extractTimeout = setTimeout(() => {
                if (coverUrl && !formId) { // 只有新增时自动提取
                    extractColorFromCover();
                }
            }, 800);
        }

        function handleCoverLoad() {
            // 图片加载完成后，仅在新增模式且未设置颜色时自动提取
            const formId = document.getElementById('form-id').value;
            const currentColor = document.getElementById('form-color').value;
            
            if (!formId && currentColor === '#6366f1') {
                extractColorFromCover();
            }
        }

        function handleCoverError() {
            console.error('封面图片加载失败');
        }

        function handleSecretTrigger() {
            secretClickCount++;
            if (secretClickCount >= 5) {
                toggleMode();
                secretClickCount = 0; 
            }
            clearTimeout(secretClickTimer);
            secretClickTimer = setTimeout(() => {
                secretClickCount = 0;
            }, 1000);
        }

        document.getElementById('secret-trigger-pc').addEventListener('click', handleSecretTrigger);
        document.getElementById('secret-trigger-mobile').addEventListener('click', handleSecretTrigger);

        function toggleMode() {
            body.classList.toggle('admin-active');
            if (body.classList.contains('admin-active')) {
                closeDetail();
                renderAdminList();
            } else {
                renderClientList(); 
                window.scrollTo(0,0);
            }
        }

        // 初始化
        renderClientList();

    </script>
</body>
