order-radius:4px;background:#d2d5d2}.history-sheet header,.answers-drawer header{display:flex;align-items:center;justify-content:space-between;padding:0 0 14px;border-bottom:1px solid var(--line)}.history-sheet h2,.answers-drawer h2{margin:0;font-size:19px}.sheet-close{border:0;background:transparent;color:var(--muted);font-size:13px}.sheet-item{display:block;width:100%;padding:16px 0;border:0;border-bottom:1px solid var(--line);background:transparent;color:var(--ink);font-size:15px;text-align:left}.sheet-item span{display:block;margin-top:5px;color:var(--muted);font-size:12px}.answers-drawer{position:fixed;z-index:50;top:0;right:0;bottom:0;width:min(90vw,430px);display:block;padding:26px 20px;background:var(--paper);box-shadow:-12px 0 40px rgba(25,29,26,.16);transform:translateX(105%);transition:transform .3s ease;overflow-y:auto}.answers-drawer.open{transform:translateX(0)}.drawer-answer{display:block;width:100%;padding:17px 0;border:0;border-bottom:1px solid var(--line);background:transparent;color:var(--ink);text-align:left}.drawer-answer strong{display:block;font-size:15px;line-height:1.55}.drawer-answer span{display:block;margin-top:7px;color:var(--muted);font-size:12px}}

  <script>
    const questions=[
      {n:1,c:'游戏记忆',q:'哪一款游戏，第一次让你真正意识到「游戏也可以讲一个好故事」？'},
      {n:3,c:'游戏记忆',q:'中国玩家第一次意识到「打游戏真的能为国争光」，是什么时候？'},
      {n:5,c:'游戏记忆',q:'你最想回到哪一款旧游戏的世界，再完整体验一次？'},
      {n:8,c:'什么是东方',q:'在电子游戏里，什么样的画面和声音会让你感到「这很东方」？'},
      {n:12,c:'什么是东方',q:'东方幻想与西方奇幻，在世界观塑造上最大的不同是什么？'},
      {n:16,c:'武侠江湖',q:'哪一款武侠游戏，最接近你心中的江湖？'},
      {n:21,c:'制作人说',q:'有哪些看似简单的游戏机制，背后藏着精妙的设计？'},
      {n:28,c:'玩家故事',q:'你在游戏中结识的人，后来还留在你的生活里吗？'},
      {n:33,c:'玩家故事',q:'有没有一段游戏经历，在多年后仍然改变着你的选择？'},
      {n:41,c:'未来游戏',q:'当人工智能成为游戏角色的一部分，我们会获得怎样的新体验？'}
    ];
    const answers=[
      {title:'为什么很多人多年后仍会反复重玩童年时的游戏？',author:'纸上玩家',bio:'游戏文化观察者',copy:'重玩并不只是重复消费内容，它更像是在熟悉的地图中寻找过去的自己。规则没有变化，但玩家已经变了。有些玩家告诉我，他们每年都会花一个周末重新打开二十年前的老游戏，只为了再次听到开场音乐的那一瞬间。他们说，当像素画面亮起、熟悉的旋律响起，整个人仿佛回到了暑假的午后——客厅里电风扇嗡嗡作响，电视机的显像管还带着静电，手里握着满是胶痕的手柄。那种感觉不是简单的怀旧，而是一种时间锚点。成年后的生活充满不确定感，但回到旧游戏的流程里，每一条岔路、每一个隐藏道具、每一段固定的对话都在提醒你：这里是确定的，你是安全的。这是当代人最稀缺的体验——在一个完全可预测的世界里，获得片刻的掌控感。很多游戏设计师低估了重复游玩的情感价值。他们倾向于用新鲜内容留住玩家，却忽略了当玩家第二次、第三次、第十次回到同一个场景时，游戏的意义已经从"探索未知"变为"回归熟悉"。这种转变并不会让游戏变得乏味，反而让它进入了一种新的情感维度——它成为了你人生叙事中一个稳定的配角。我们怀念的或许不是那款游戏，而是第一次推开那扇门时的自己。而重玩，就是回去敲那扇已经虚掩的门，看看自己会不会也推开它。',quote:'我们怀念的或许不是那款游戏，而是第一次推开那扇门时的自己。',stats:'赞同 328 · 评论 42'},
      {title:'什么样的游戏美术，能够真正表达东方气质？',author:'林间听雨',bio:'独立美术设计师',copy:'东方感不等于符号的堆叠。留白、节奏、人与环境的尺度关系，往往比灯笼和飞檐更能决定作品的气质。我曾在三个不同国家的团队参与过东方题材的项目，有意思的是，每当海外团队试图做一款"东方风"的游戏时，第一步往往是搜集视觉元素：灯笼、飞檐、祥云、水墨笔触。这些东西本身没错，但当它们在画面上拥挤地堆叠在一起时，反而失去了"东方"最重要的东西——呼吸感。中国的山水画最厉害的地方从来不是画了什么，而是没画什么。马远画《水图》十二幅，只画水纹，没有一舟一人，却让人看了觉得天地浩渺。这种以少胜多的表达方式，在游戏美术中同样成立。一座山不需要把每一棵树都建模，一段路不需要挤满NPC，一栋建筑不需要填满装饰。真正的东方气质往往藏在画面的留白处，在角色沉默的间隙，在环境与人之间的尺度中。文化表达首先是一种观看世界的方式，然后才是一组视觉元素。好的东方风格作品让玩家在画面中感受呼吸，而不是被信息淹没。',quote:'文化表达首先是一种观看世界的方式，然后才是一组视觉元素。',stats:'赞同 216 · 评论 31'},
      {title:'一款好游戏，应该如何处理失败带来的挫败感？',author:'第九关',bio:'关卡设计从业者',copy:'失败需要提供信息，让玩家知道下一次可以做得更好。如果只有惩罚而没有反馈，挑战就会逐渐变成消耗。',quote:'好的失败会让人说「再来一次」，而不是「到此为止」。',stats:'赞同 189 · 评论 27'},
      {title:'游戏中的伙伴为什么会让人产生真实的情感？',author:'存档点',bio:'叙事游戏爱好者',copy:'情感并不取决于角色是否真实存在，而取决于共同经历是否被玩家真实感受。一次救援、一次告别，都可能成为记忆。',quote:'虚构的角色，也能参与一段真实的人生。',stats:'赞同 405 · 评论 66'},
      {title:'开放世界越大，就一定越好玩吗？',author:'地图边缘',bio:'开放世界研究者',copy:'尺度只是容器，密度与节奏才决定探索是否成立。真正重要的是玩家每次偏离主路时，都能得到值得记住的回应。',quote:'世界的辽阔不在公里数，而在好奇心被回应的次数。',stats:'赞同 274 · 评论 53'},
      {title:'老游戏最值得被现代作品继承的是什么？',author:'像素考古队',bio:'经典游戏收藏者',copy:'限制条件迫使早期作品更重视核心反馈。现代技术可以升级表现，但不应掩盖规则本身是否足够清晰和有趣。',quote:'技术会过时，扎实的乐趣不会。',stats:'赞同 152 · 评论 19'}
    ];
    let mainQuestionIndex=0,answerIndex=0,activeCategory='全部问题',descending=true,questionBatch=[];
    const mainQuestion=document.getElementById('mainQuestion'),mainNumber=document.getElementById('mainNumber'),categoryBadge=document.getElementById('categoryBadge'),questionGrid=document.getElementById('questionGrid');
    const categoryButton=document.getElementById('categoryButton'),categoryMenu=document.getElementById('categoryMenu');
    const categories=['全部问题',...new Set(questions.map(item=>item.c))];
    function visibleQuestions(){const list=activeCategory==='全部问题'?questions:questions.filter(item=>item.c===activeCategory);return [...list].sort((a,b)=>descending?b.n-a.n:a.n-b.n)}
    function showMainQuestion(item){mainQuestion.textContent=item.q;mainNumber.textContent=item.n;categoryBadge.textContent=`「${item.c}」`}
    function randomMainQuestion(){const list=visibleQuestions();if(list.length<2)return;let next=mainQuestionIndex;while(next===mainQuestionIndex)next=Math.floor(Math.random()*list.length);mainQuestionIndex=next;showMainQuestion(list[mainQuestionIndex])}
    function createQuestionBatch(){const pool=[...visibleQuestions()];for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}questionBatch=pool.slice(0,Math.min(6,pool.length));renderQuestions()}
    function renderQuestions(){questionGrid.innerHTML=questionBatch.map(item=>`<article class="question-card" data-number="${item.n}"><div class="card-top"><strong>${item.n}<small>/90</small></strong><span>「${item.c}」</span></div><p>${item.q}</p></article>`).join('');questionGrid.querySelectorAll('.question-card').forEach(card=>card.addEventListener('click',()=>{const item=questions.find(question=>question.n===Number(card.dataset.number));mainQuestionIndex=visibleQuestions().findIndex(question=>question.n===item.n);showMainQuestion(item);window.scrollTo({top:document.querySelector('.question-stage').offsetTop-14,behavior:'smooth'})}))}
    function resetQuestionSection(){mainQuestionIndex=0;showMainQuestion(visibleQuestions()[0]);createQuestionBatch()}
    function renderCategories(){categoryMenu.innerHTML=categories.map(category=>`<button class="category-option ${category===activeCategory?'active':''}" data-category="${category}"><span>${category}</span><small>${category==='全部问题'?questions.length:questions.filter(item=>item.c===category).length}</small></button>`).join('');categoryMenu.querySelectorAll('.category-option').forEach(option=>option.addEventListener('click',()=>{activeCategory=option.dataset.category;categoryButton.innerHTML=`☷&nbsp; ${activeCategory}⌄`;categoryMenu.classList.remove('open');categoryButton.classList.remove('active');categoryButton.setAttribute('aria-expanded','false');renderCategories();resetQuestionSection()}))}
    function renderFeaturedAnswer(){const answer=answers[answerIndex];document.getElementById('answerTitle').textContent=answer.title;document.getElementById('answerAvatar').textContent=answer.author[0];document.getElementById('answerAuthor').textContent=answer.author;document.getElementById('answerBio').textContent=answer.bio;document.getElementById('answerCopy').textContent=answer.copy;document.getElementById('answerQuote').textContent=answer.quote;document.getElementById('answerStats').textContent=answer.stats}
    function renderAnswerList(){document.getElementById('answerList').innerHTML=answers.map((answer,index)=>`<article class="answer-row" data-index="${index}"><strong>${answer.title}</strong><div class="answer-meta"><span>${answer.author}</span><span>${answer.stats.split(' · ')[0]}</span></div></article>`).join('');document.querySelectorAll('.answer-row').forEach(row=>{row.addEventListener('click',()=>{answerIndex=Number(row.dataset.index);renderFeaturedAnswer();document.querySelector('.answers-column').scrollIntoView({behavior:'smooth'})})})}
    const overlay=document.getElementById('mobileOverlay'),historySheet=document.getElementById('historySheet'),answersDrawer=document.getElementById('answersDrawer'),questionsDrawer=document.getElementById('questionsDrawer');
    function openMobilePanel(panel){overlay.classList.add('open');panel.classList.add('open');panel.setAttribute('aria-hidden','false');document.body.classList.add('drawer-open')}
    function closeMobilePanels(){overlay.classList.remove('open');[historySheet,answersDrawer,questionsDrawer].forEach(panel=>{panel.classList.remove('open');panel.setAttribute('aria-hidden','true')});document.body.classList.remove('drawer-open')}
    function renderMobileQuestionList(){document.getElementById('mobileQuestionList').innerHTML=questions.map(item=>`<button class="drawer-answer" data-number="${item.n}"><strong>${item.q}</strong><span>第 ${item.n} 问 · 「${item.c}」</span></button>`).join('');document.querySelectorAll('#mobileQuestionList .drawer-answer').forEach(item=>item.addEventListener('click',()=>{const question=questions.find(entry=>entry.n===Number(item.dataset.number));mainQuestionIndex=visibleQuestions().findIndex(entry=>entry.n===question.n);showMainQuestion(question);closeMobilePanels();document.querySelector('.question-stage').scrollIntoView({behavior:'smooth'})}))}
    function renderMobileAnswerList(){document.getElementById('mobileAnswerList').innerHTML=answers.map((answer,index)=>`<button class="drawer-answer" data-index="${index}"><strong>${answer.title}</strong><span>${answer.author} · ${answer.stats.split(' · ')[0]}</span></button>`).join('');document.querySelectorAll('.drawer-answer').forEach(item=>item.addEventListener('click',()=>{answerIndex=Number(item.dataset.index);renderFeaturedAnswer();closeMobilePanels();document.querySelector('.answers-column').scrollIntoView({behavior:'smooth'})}))}
    categoryButton.addEventListener('click',()=>{const open=categoryMenu.classList.toggle('open');categoryButton.classList.toggle('active',open);categoryButton.setAttribute('aria-expanded',String(open))});document.addEventListener('click',event=>{if(!event.target.closest('.category-wrap')){categoryMenu.classList.remove('open');categoryButton.classList.remove('active');categoryButton.setAttribute('aria-expanded','false')}});
    document.getElementById('randomMain').addEventListener('click',randomMainQuestion);document.getElementById('randomTop').addEventListener('click',createQuestionBatch);document.getElementById('latestButton').addEventListener('click',event=>{descending=!descending;event.currentTarget.textContent=descending?'≡  最新问题在前':'≡  最早问题在前';resetQuestionSection()});document.getElementById('switchAnswer').addEventListener('click',()=>{let next=answerIndex;while(next===answerIndex)next=Math.floor(Math.random()*answers.length);answerIndex=next;renderFeaturedAnswer()});
    document.getElementById('historyTrigger').addEventListener('click',()=>openMobilePanel(historySheet));document.getElementById('allAnswersTrigger').addEventListener('click',()=>openMobilePanel(answersDrawer));document.getElementById('moreQuestionsTrigger').addEventListener('click',()=>openMobilePanel(questionsDrawer));overlay.addEventListener('click',closeMobilePanels);document.querySelectorAll('[data-close]').forEach(button=>button.addEventListener('click',closeMobilePanels));
    renderCategories();resetQuestionSection();renderAnswerList();renderMobileAnswerList();renderMobileQuestionList();renderFeaturedAnswer();
  </script>
</body>
</html>
